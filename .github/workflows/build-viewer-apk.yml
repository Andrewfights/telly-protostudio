name: Build Telly Viewer APK

on:
  push:
    branches: [main]
    paths:
      - 'TellyViewer/**'
  pull_request:
    branches: [main]
    paths:
      - 'TellyViewer/**'
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        working-directory: TellyViewer
        run: chmod +x gradlew

      - name: Generate Gradle Wrapper
        working-directory: TellyViewer
        run: |
          # Download gradle wrapper jar if not present
          mkdir -p gradle/wrapper
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            curl -sL https://services.gradle.org/distributions/gradle-8.4-bin.zip -o gradle.zip
            unzip -q gradle.zip
            cp gradle-8.4/lib/gradle-wrapper-*.jar gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
            gradle wrapper --gradle-version 8.4
            rm -rf gradle.zip gradle-8.4
          fi

      - name: Build Debug APK
        working-directory: TellyViewer
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Release APK
        working-directory: TellyViewer
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: TellyViewer-debug
          path: TellyViewer/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: TellyViewer-release-unsigned
          path: TellyViewer/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Debug APK
        uses: actions/download-artifact@v4
        with:
          name: TellyViewer-debug
          path: ./artifacts

      - name: Get version
        id: version
        run: |
          VERSION=$(grep 'versionName' TellyViewer/app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: viewer-v${{ steps.version.outputs.version }}
          name: Telly Viewer v${{ steps.version.outputs.version }}
          body: |
            ## Telly Prototype Viewer

            Download the APK and sideload it to your Telly device.

            ### Installation
            1. Download `TellyViewer-debug.apk`
            2. Transfer to your Telly device
            3. Install via Settings > Security > Unknown sources
            4. Open "Telly Prototype Viewer" from the app drawer

            ### Usage
            - Export prototypes from ProtoStudio as `.telly` files
            - Place `.telly` files in your device's Downloads folder
            - Open the Viewer app to see and launch your prototypes
          files: |
            ./artifacts/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
